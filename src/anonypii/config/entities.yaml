# anonypii default entity configuration
# schema_version must match the loader's SUPPORTED_SCHEMA_VERSIONS list.
# -----------------------------------------------------------------------
# To use a subset: copy this file, remove unwanted types, and pass the
# path to Anonymizer(config_path="your_config.yaml").
#
# You can activate types either individually (active_entity_types) or
# by coarse group (active_coarse_groups), or both — the union is used.
# If both lists are empty and active_entity_types is omitted entirely,
# all 82 entity types are active.
# -----------------------------------------------------------------------

schema_version: "1.0"

# Leave this key absent or set to [] to activate ALL entity types.
# active_entity_types:

# Leave this key absent or set to [] to activate ALL coarse groups.
# active_coarse_groups:

